{% extends "base.html" %}

{% block contenido %}
<h2>Gestión de precios por noche</h2>

<form method="post" action="/admin/precios">
    <label>Fecha:</label><br>
    <input type="date" name="fecha" required><br><br>

    <label>Precio (€):</label><br>
    <input type="number" step="0.01" name="precio" required><br><br>

    <button type="submit">Guardar precio</button>
</form>

<hr>

<h3>Precios configurados</h3>

{% if precios %}
<table border="1" cellpadding="8">
    <tr>
        <th>Fecha</th>
        <th>Precio (€)</th>
    </tr>

    {% for precio in precios %}
    <tr>
        <td>{{ precio.fecha }}</td>
        <td>{{ precio.precio }} €</td>
    </tr>
    {% endfor %}
</table>

{% else %}
<p>No hay precios configurados todavía.</p>
{% endif %}

{% endblock %}
